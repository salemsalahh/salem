        .vcard {

            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        .header {
            height: 35%;
            position: relative;
        }

        /* حاوية الـ Canvas الخاصة بالأمواج */
        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none; /* لمنع حجب النقرات عن الأيقونات */
        }

        .profile_pic_content {
            width: 135px;
            height: 135px;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            top: 100%;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            border: 3px solid var(--muted-gold);
            background-color: #000;
            z-index: 20;
        }

        .profile_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card_content {
            padding-top: 85px;
            text-align: center;
            z-index: 20;
            position: relative;
        }

        .satan h4 {
            font-size: 1.9em;
            letter-spacing: 3px;
            background: linear-gradient(to right, var(--gold), var(--white));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;

        }

        .snuff {

        }

        .social {

        }

        .social div {
            display: flex;
            justify-content: center;

            gap: 12px;
            flex-wrap: wrap;
        }

        .social a {

        .social i {

            color: var(--muted-gold);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto; /* تأكيد استقبال اللمس */

        .social a:hover i { 
            color: var(--gold) !important; 
            background: rgba(197, 160, 89, 0.15);
            transform: translateY(-5px);
            border-color: var(--gold);

            width: 100%;
            font-size: 0.75em;
            color: rgba(136, 146, 176, 0.4);
            text-align: center;
            z-index: 10;
        }

<script id="vertexShader" type="x-shader/x-vertex">
    varying vec2 vUv;
    varying float vOffset;
    uniform float uTime;
    uniform float uTouch;

    // دالة Sine متقدمة لإنشاء تموجات تداخلية
    void main() {
        vUv = uv;
        
        // حساب التموجات بناءً على الوقت واللمس
        float strength = 0.08 + uTouch * 0.15; // تزايد قوة الموجة عند اللمس
        float x_wave = sin(position.x * 2.0 + uTime * 0.8) * strength;
        float z_wave = sin(position.z * 1.5 + uTime * 0.6) * strength;
        float wave = x_wave + z_wave;
        
        vOffset = wave; // لتمرير قيمة الموجة للفرغمنت شيدر

        vec3 newPosition = position + vec3(0.0, wave, 0.0);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
    }
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
    varying vec2 vUv;
    varying float vOffset;
    uniform float uTime;

    void main() {
        // الألوان المعتمدة للبطاقة الملكية (Midnight Blue & Gold Glow)
        vec3 deepBlue = vec3(0.015, 0.035, 0.08); // تدرج داكن للأزرق
        vec3 goldColor = vec3(0.95, 0.82, 0.35); // تدرج ذهبي متوهج

        // إنشاء تدرج لوني عميق (Deep Gradient)
        float mix_val = (vUv.y * 0.6) + (vOffset * 0.4);
        vec3 final_color = mix(deepBlue, deepBlue * 1.8, mix_val);
        
        // إضافة توهج ذهبي خفيف فوق الأمواج (Glow-effect)
        float glow = clamp(vOffset, 0.0, 1.0) * 1.8;
        final_color += goldColor * glow;

        gl_FragColor = vec4(final_color, 1.0);
    }
</script>

<script>
    // إعداد الـ Three.js الأساسي لبطاقة VCard
    let container = document.getElementById('canvas-container');
    let scene, camera, renderer, mesh;
    let clock = new THREE.Clock();
    let touchStrength = 0; // متيّر لقياس قوة اللمس
    let isTouch = false;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        
        // الكاميرا Perspective لرؤية الأبعاد
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.set(0, 0, 1.3);

        // إعداد هندسة الموجة (سطح مستو بآلاف النقاط)
        const geometry = new THREE.PlaneGeometry(3, 1.5, 64, 64);
        geometry.rotateX(-Math.PI * 0.1); // إمالة خفيفة للسطح

        // إعداد الـ Shader Material بالألوان والوقت
        const material = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            uniforms: {
                uTime: { value: 0.0 },
                uTouch: { value: 0.0 }, // قيمة اللمس الأولية
            },
            transparent: true,
            depthWrite: false, // لضمان ظهور الـ Canvas خلف بقية العناصر
        });

        mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // إعداد الـ Renderer المصغر لآيفون
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio); // لتوافق شاشة ريتينا
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping; // لتوهج لوني فخم
        container.appendChild(renderer.domElement);

        // التعامل مع تغير حجم الشاشة
        window.addEventListener('resize', onWindowResize, false);
        
        // إضافة تفاعل اللمس (التفاعلي)
        container.addEventListener('touchstart', onTouchStart, false);
        container.addEventListener('touchend', onTouchEnd, false);
        // دعم حركة الفأرة (للتوافق)
        window.addEventListener('mousedown', onTouchStart, false);
        window.addEventListener('mouseup', onTouchEnd, false);
    }

    // دوال التعامل مع اللمس التفاعلي
    function onTouchStart() { isTouch = true; }
    function onTouchEnd() { isTouch = false; }

    function onWindowResize() {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    }

    // دالة الأنيميشن المستمرة
    function animate() {
        requestAnimationFrame(animate);
        const elapsedTime = clock.getElapsedTime();
        
        // تحديث الوقت للـ Shader لتدوير الأمواج
        mesh.material.uniforms.uTime.value = elapsedTime;
        
        // تحديث شدة اللمس بنعومة (Smoothing)
        const targetTouch = isTouch ? 1.0 : 0.0;
        touchStrength += (targetTouch - touchStrength) * 0.08; // تمهيد التغيير
        mesh.material.uniforms.uTouch.value = touchStrength;
        
        // تدوير خفيف للمشهد عند اللمس (اختياري)
        mesh.rotation.y = Math.sin(elapsedTime * 0.2) * 0.03 * touchStrength;
        
        renderer.render(scene, camera);
    }
</script>
