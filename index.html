            text-align: center;

        .social {

        .cursor {
            display: inline-block;

            animation: continuous-blink 1s infinite alternate;
        }

        @keyframes continuous-blink {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

<!-- بقية السكربتات الخاصة بـ Three.js و Particles كما هي دون تغيير -->
<script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
            "animejs": "https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.es.js",
            "simplex-noise": "https://cdn.skypack.dev/simplex-noise@4.0.1"
        }
    }
</script>
<script type="module">
    import * as THREE from 'three';
    import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
    import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
    import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
    import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
    import anime from 'animejs';
    import {createNoise3D, createNoise4D} from 'simplex-noise';

    let scene, camera, renderer, controls, clock;
    let composer, bloomPass;
    let particlesGeometry, particlesMaterial, particleSystem;
    let currentPositions, sourcePositions, targetPositions, swarmPositions;
    let particleSizes, particleOpacities, particleEffectStrengths;
    let noise3D, noise4D;
    let morphTimeline = null;
    let isInitialized = false;
    let isMorphing = false;
    let initialScaleDone = false;
    let currentShapeIndex = 0;

    const CONFIG = {
        particleCount: 30000,
        shapeSize: 35,
        swarmDistanceFactor: 1.5,
        swirlFactor: 4.0,
        noiseFrequency: 0.1,
        noiseTimeScale: 0.04,
        noiseMaxStrength: 2.8,
        colorScheme: 'fire',
        morphDuration: 4000,
        particleSizeRange: [0.05, 0.15],
        starCount: 18000,
        bloomStrength: 1.5,
        bloomRadius: 0.8,
        bloomThreshold: 0.05,
        idleFlowStrength: 0.25,
        idleFlowSpeed: 0.08,
        idleRotationSpeed: 0.02,
        morphSizeFactor: 0.5,
        morphBrightnessFactor: 0.6
    };

    const morphState = {progress: 0.0};
    const scaleState = {currentShapeSize: CONFIG.shapeSize};

    const COLOR_SCHEMES = {
        fire: {startHue: 0, endHue: 45, saturation: 0.95, lightness: 0.6},
        neon: {startHue: 300, endHue: 180, saturation: 1.0, lightness: 0.65},
        nature: {startHue: 90, endHue: 160, saturation: 0.85, lightness: 0.55},
        rainbow: {startHue: 0, endHue: 360, saturation: 0.9, lightness: 0.6},
        ocean: {startHue: 180, endHue: 240, saturation: 0.9, lightness: 0.6},
        forest: {startHue: 60, endHue: 120, saturation: 0.8, lightness: 0.5},
        gold: {startHue: 40, endHue: 60, saturation: 0.9, lightness: 0.7}
    };
    const colorSchemeNames = Object.keys(COLOR_SCHEMES);

    const tempVec = new THREE.Vector3();
    const sourceVec = new THREE.Vector3();
    const targetVec = new THREE.Vector3();
    const swarmVec = new THREE.Vector3();
    const noiseOffset = new THREE.Vector3();
    const flowVec = new THREE.Vector3();
    const bezPos = new THREE.Vector3();
    const swirlAxis = new THREE.Vector3();
    const currentVec = new THREE.Vector3();

    function generateRandomPoints(count, size) {
        const points = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            points.set([
                (Math.random() - 0.5) * size * 1.5,
                (Math.random() - 0.5) * size * 1.5,
                (Math.random() - 0.5) * size * 1.5
            ], i * 3);
        }
        return points;
    }

    async function init() {
        clock = new THREE.Clock();
        noise3D = createNoise3D(() => Math.random());
        noise4D = createNoise4D(() => Math.random());
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000308, 0.015);
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, CONFIG.shapeSize * 0.8);
        const canvas = document.getElementById('webglCanvas');
        renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: true, powerPreference: 'high-performance'});
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        setupPostProcessing();
        createStarfield();
        await setupParticleSystem();
        window.addEventListener('resize', onWindowResize);
        window.addEventListener('click', onCanvasClick);
        isInitialized = true;
        animate();
        triggerInitialScale();
    }

    function setupPostProcessing() {
        composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), CONFIG.bloomStrength, CONFIG.bloomRadius, CONFIG.bloomThreshold);
        composer.addPass(bloomPass);
    }

    function createStarfield() {
        const starVertices = [];
        const starSizes = [];
        const starColors = [];
        const starGeometry = new THREE.BufferGeometry();
        for (let i = 0; i < CONFIG.starCount; i++) {
            tempVec.set(THREE.MathUtils.randFloatSpread(400), THREE.MathUtils.randFloatSpread(400), THREE.MathUtils.randFloatSpread(400));
            if (tempVec.length() < 100) tempVec.setLength(100 + Math.random() * 300);
            starVertices.push(tempVec.x, tempVec.y, tempVec.z);
            starSizes.push(Math.random() * 0.15 + 0.05);
            const color = new THREE.Color();
            color.setHSL(0.6, Math.random() * 0.1, 0.8 + Math.random() * 0.2);
            starColors.push(color.r, color.g, color.b);
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starVertices), 3));
        starGeometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(starColors), 3));
        starGeometry.setAttribute('size', new THREE.BufferAttribute(new Float32Array(starSizes), 1));
        const starMaterial = new THREE.ShaderMaterial({
            uniforms: { pointTexture: {value: createStarTexture()} },
            vertexShader: `attribute float size; varying vec3 vColor; void main() { vColor = color; vec4 mvPosition = modelViewMatrix * vec4(position, 1.0); gl_PointSize = size * (400.0 / -mvPosition.z); gl_Position = projectionMatrix * mvPosition; }`,
            fragmentShader: `uniform sampler2D pointTexture; varying vec3 vColor; void main() { float alpha = texture2D(pointTexture, gl_PointCoord).a; if (alpha < 0.1) discard; gl_FragColor = vec4(vColor, alpha * 0.9); }`,
            blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, vertexColors: true
        });
        scene.add(new THREE.Points(starGeometry, starMaterial));
    }

    function createStarTexture() {
        const size = 64;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const context = canvas.getContext('2d');
        const gradient = context.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        context.fillStyle = gradient;
        context.fillRect(0, 0, size, size);
        return new THREE.CanvasTexture(canvas);
    }

    async function setupParticleSystem() {
        const SHAPES = [{name: 'Random Scatter', generator: () => generateRandomPoints(CONFIG.particleCount, CONFIG.shapeSize)}];
        targetPositions = [await SHAPES[0].generator()];
        particlesGeometry = new THREE.BufferGeometry();
        currentPositions = new Float32Array(targetPositions[0]);
        sourcePositions = new Float32Array(targetPositions[0]);
        swarmPositions = new Float32Array(CONFIG.particleCount * 3);
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
        particleSizes = new Float32Array(CONFIG.particleCount);
        particleOpacities = new Float32Array(CONFIG.particleCount);
        particleEffectStrengths = new Float32Array(CONFIG.particleCount);
        for (let i = 0; i < CONFIG.particleCount; i++) {
            particleSizes[i] = THREE.MathUtils.randFloat(CONFIG.particleSizeRange[0], CONFIG.particleSizeRange[1]);
            particleOpacities[i] = 1.0;
        }
        particlesGeometry.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));
        particlesGeometry.setAttribute('opacity', new THREE.BufferAttribute(particleOpacities, 1));
        particlesGeometry.setAttribute('aEffectStrength', new THREE.BufferAttribute(particleEffectStrengths, 1));
        const colors = new Float32Array(CONFIG.particleCount * 3);
        updateColorArray(colors, currentPositions);
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        particlesMaterial = new THREE.ShaderMaterial({
            uniforms: { pointTexture: {value: createStarTexture()} },
            vertexShader: `attribute float size; attribute float opacity; attribute float aEffectStrength; varying vec3 vColor; varying float vOpacity; varying float vEffectStrength; void main() { vColor = color; vOpacity = opacity; vEffectStrength = aEffectStrength; vec4 mvPosition = modelViewMatrix * vec4(position, 1.0); float sizeScale = 1.0 - vEffectStrength * ${CONFIG.morphSizeFactor.toFixed(2)}; gl_PointSize = size * sizeScale * (400.0 / -mvPosition.z); gl_Position = projectionMatrix * mvPosition; }`,
            fragmentShader: `uniform sampler2D pointTexture; varying vec3 vColor; varying float vOpacity; varying float vEffectStrength; void main() { float alpha = texture2D(pointTexture, gl_PointCoord).a; if (alpha < 0.05) discard; vec3 finalColor = vColor * (1.0 + vEffectStrength * ${CONFIG.morphBrightnessFactor.toFixed(2)}); gl_FragColor = vec4(finalColor, alpha * vOpacity); }`,
            blending: THREE.AdditiveBlending, depthTest: true, depthWrite: false, transparent: true, vertexColors: true
        });
        particleSystem = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particleSystem);

        window.triggerMorph = function () {
            if (isMorphing) return;
            isMorphing = true;
            sourcePositions.set(currentPositions);
            const newRandomTarget = generateRandomPoints(CONFIG.particleCount, CONFIG.shapeSize);
            targetPositions[0] = newRandomTarget;
            const nextTargetPositions = targetPositions[0];
            for (let i = 0; i < CONFIG.particleCount; i++) {
                const i3 = i * 3;
                sourceVec.fromArray(sourcePositions, i3);
                targetVec.fromArray(nextTargetPositions, i3);
                swarmVec.lerpVectors(sourceVec, targetVec, 0.5);
                swarmPositions[i3] = swarmVec.x; swarmPositions[i3+1] = swarmVec.y; swarmPositions[i3+2] = swarmVec.z;
            }
            morphState.progress = 0;
            morphTimeline = anime({
                targets: morphState, progress: 1, duration: CONFIG.morphDuration, easing: 'cubicBezier(0.4, 0.0, 0.2, 1.0)',
                complete: () => {
                    currentPositions.set(targetPositions[0]);
                    particlesGeometry.attributes.position.needsUpdate = true;
                    isMorphing = false;
                }
            });
        }
    }

    function updateColorArray(colors, positionsArray) {
        const colorScheme = COLOR_SCHEMES[CONFIG.colorScheme];
        for (let i = 0; i < CONFIG.particleCount; i++) {
            const i3 = i * 3;
            tempVec.fromArray(positionsArray, i3);
            const hue = THREE.MathUtils.mapLinear(tempVec.length(), 0, CONFIG.shapeSize * 1.5, colorScheme.startHue, colorScheme.endHue);
            const color = new THREE.Color().setHSL(hue / 360, colorScheme.saturation, colorScheme.lightness);
            color.toArray(colors, i3);
        }
    }

    function updateColors() {
        const colors = particlesGeometry.attributes.color.array;
        updateColorArray(colors, particlesGeometry.attributes.position.array);
        particlesGeometry.attributes.color.needsUpdate = true;
    }

    function triggerInitialScale() {
        initialScaleDone = true;
        isMorphing = true;
        anime({
            targets: scaleState, currentShapeSize: CONFIG.shapeSize, duration: CONFIG.morphDuration, easing: 'linear',
            complete: () => { isMorphing = false; }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const elapsed = clock.getElapsedTime();
        controls.update();
        const pos = particlesGeometry.attributes.position.array;
        const eff = particlesGeometry.attributes.aEffectStrength.array;
        if (isMorphing) { updateMorphAnimation(pos, eff, elapsed, delta); } 
        else { updateIdleAnimation(pos, eff, elapsed, delta); }
        particlesGeometry.attributes.position.needsUpdate = true;
        composer.render(delta);
    }

    function updateMorphAnimation(positions, effectStrengths, elapsedTime, deltaTime) {
        const t = morphState.progress;
        const targets = targetPositions[0];
        for (let i = 0; i < CONFIG.particleCount; i++) {
            const i3 = i * 3;
            sourceVec.fromArray(sourcePositions, i3);
            targetVec.fromArray(targets, i3);
            currentVec.lerpVectors(sourceVec, targetVec, t);
            positions[i3] = currentVec.x; positions[i3+1] = currentVec.y; positions[i3+2] = currentVec.z;
            effectStrengths[i] = Math.sin(t * Math.PI);
        }
        particlesGeometry.attributes.aEffectStrength.needsUpdate = true;
    }

    function updateIdleAnimation(positions, effectStrengths, elapsedTime, deltaTime) {
        const timeScaled = elapsedTime * CONFIG.idleFlowSpeed;
        for (let i = 0; i < CONFIG.particleCount; i++) {
            const i3 = i * 3;
            sourceVec.fromArray(sourcePositions, i3);
            flowVec.set(noise4D(sourceVec.x*0.1, sourceVec.y*0.1, sourceVec.z*0.1, timeScaled), 0, 0);
            tempVec.copy(sourceVec).addScaledVector(flowVec, CONFIG.idleFlowStrength);
            currentVec.fromArray(positions, i3);
            currentVec.lerp(tempVec, 0.05);
            positions[i3] = currentVec.x; positions[i3+1] = currentVec.y; positions[i3+2] = currentVec.z;
            effectStrengths[i] = 0;
        }
    }

    function onCanvasClick() {
        window.triggerMorph();
        CONFIG.colorScheme = colorSchemeNames[Math.floor(Math.random() * colorSchemeNames.length)];
        updateColors();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
</script>
