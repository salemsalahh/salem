<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساعة تناظرية متطورة</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: sans-serif;
        }

        .clock {
            width: 300px;
            height: 300px;
            background-color: white;
            border: 10px solid #333;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* نقطة المركز */
        .clock::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #333;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            transform: translateX(-50%);
        }

        .hour {
            width: 8px;
            height: 60px;
            background-color: #333;
            z-index: 3;
        }

        .minute {
            width: 6px;
            height: 90px;
            background-color: #666;
            z-index: 2;
        }

        .second {
            width: 2px;
            height: 110px;
            background-color: #e74c3c;
            z-index: 1;
            /* إضافة تنعيم بسيط لحركة الثواني */
            transition: transform 0.2s cubic-bezier(0.4, 2.08, 0.55, 0.44);
        }

        /* إضافة أرقام وهمية كتصميم */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="clock">
        <div class="number" style="transform: rotate(0deg)">12</div>
        <div class="number" style="transform: rotate(90deg)">3</div>
        <div class="number" style="transform: rotate(180deg)">6</div>
        <div class="number" style="transform: rotate(270deg)">9</div>
        
        <div class="hand hour" id="hour"></div>
        <div class="hand minute" id="minute"></div>
        <div class="hand second" id="second"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();

            // الحسابات الرياضية للزوايا
            const secondDeg = seconds * 6;
            const minuteDeg = (minutes * 6) + (seconds * 0.1);
            const hourDeg = ((hours % 12) * 30) + (minutes * 0.5);

            // تطبيق الدوران
            document.getElementById("second").style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
            document.getElementById("minute").style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
            document.getElementById("hour").style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
        }

        // تحديث كل ثانية
        setInterval(updateClock, 1000);
        
        // تشغيل فوري
        updateClock();
    </script>
</body>
</html>
